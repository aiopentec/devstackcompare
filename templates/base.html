<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Compare VPS providers, app platforms, static hosting, and managed databases for your next project.{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ site_url }}/{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">{{ site_name }}</a>
    <nav>
      <a href="/category/vps.html">VPS</a>
      <a href="/category/platform.html">Platforms</a>
      <a href="/category/hosting.html">Hosting</a>
      <a href="/category/database.html">Databases</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p class="footer-links">
      <a href="/about.html">About</a> ·
      <a href="/contact.html">Contact</a> ·
      <a href="/privacy.html">Privacy Policy</a> ·
      <a href="https://github.com/aiopentec/devstackcompare" target="_blank" rel="noopener">View Source on GitHub</a>
    </p>
    <p class="footer-meta">Updated {{ build_date }} · $0/month to operate · Independent comparisons</p>
  </footer>
</body>
</html>
